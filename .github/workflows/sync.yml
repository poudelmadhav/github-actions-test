name: Sync Main to Develop

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  sync:
    if: >
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'release/') ||
        startsWith(github.event.pull_request.head.ref, 'hotfix/')
      )

    uses: poudelmadhav/github-workflows/.github/workflows/sync-main-to-develop.yml@v4
    # Optional inputs to override default values in the reusable workflow
    # with:
    #   source_branch: main     # default main
    #   target_branch: develop  # default develop
    secrets:
      approval_token: ${{ secrets.PAT_TOKEN }}
    permissions:
      contents: write
      pull-requests: write
