name: Release

on:
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  release:
    if: >
      github.event.pull_request.merged == true &&
      (
        startsWith(github.event.pull_request.head.ref, 'release/') ||
        startsWith(github.event.pull_request.head.ref, 'hotfix/')
      )

    uses: poudelmadhav/github-workflows/.github/workflows/create-release.yml@v6
    with:
      branch: ${{ github.event.pull_request.head.ref }}
      release_body: ${{ github.event.pull_request.body }} # default will be autogenerated from github if not provided
    permissions:
      contents: write
